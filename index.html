<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Simulation Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #eef2f7, #f9fbfd);
    margin: 0;
    padding: 16px;
    color: #2c3e50;
    text-align: center;
  }

  h1 { font-size: 20px; margin-bottom: 12px; }

  .card {
    background: white;
    padding: 16px;
    margin: 12px auto;
    max-width: 520px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    text-align: left;
  }

  .scenario-card { background: #2c3e50; color: white; }
  .round { font-size: 13px; opacity: 0.8; }

  .stats-card {
    display: flex;
    justify-content: space-around;
    text-align: center;
  }

  .stat {
    background: #f1f5f9;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    min-width: 90px;
  }

  .actions { display: grid; gap: 10px; margin-top: 10px; }

  .action {
    display: block;
    background: #f4f6f8;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  .action:hover { background: #e8eef7; }

  .action input { margin-right: 8px; transform: scale(1.2); }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-weight: 600;
    cursor: pointer;
  }

  .primary { background: #2ecc71; color: white; }
  .secondary { background: #3498db; color: white; }
  .danger { background: #e74c3c; color: white; }

  button:disabled {
    background: #bdc3c7;
    cursor: not-allowed;
  }

  .nav { display: flex; gap: 10px; }
  .nav button { flex: 1; }

  #feedback {
    background: #f9fafc;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>

<body>

<h1>📱 Market Simulation</h1>

<div class="card scenario-card">
  <div id="round-title" class="round"></div>
  <p id="scenario-text"></p>
</div>

<div class="card stats-card">
  <div class="stat">💰 <span id="stat-budget"></span></div>
  <div class="stat">❤️ <span id="stat-sat"></span></div>
  <div class="stat">🚀 <span id="stat-inn"></span></div>
</div>

<div class="card">
  <h3>Choose Actions (1–2 max)</h3>

  <div class="actions">
    <label class="action"><input type="checkbox" value="innovate"> ⚙️ Innovate (-3)</label>
    <label class="action"><input type="checkbox" value="lowerPrice"> 💰 Lower Price (-1)</label>
    <label class="action"><input type="checkbox" value="market"> 📢 Market (-2)</label>
    <label class="action"><input type="checkbox" value="speedUp"> ⚡ Speed Up (-2)</label>
  </div>

  <button id="submitBtn" class="primary" onclick="submitActions()">Submit Actions</button>
</div>

<div class="card">
  <p id="feedback"></p>
</div>

<div class="card nav">
  <button class="secondary" onclick="nextRound()">Next Round</button>
  <button class="danger" onclick="endGame()">End Game</button>
</div>

<script>

// ---------------- DATA ----------------
const scenarios = [
  { text: "Competitors release better features. You're losing market share!",
    impact: { innovate:[0,3], lowerPrice:[2,0], market:[1,0], speedUp:[0,1] } },
  { text: "Competitors lower their prices. Customers are switching.",
    impact: { innovate:[0,2], lowerPrice:[3,0], market:[1,0], speedUp:[1,0] } },
  { text: "Customers complain about your product features.",
    impact: { innovate:[0,4], lowerPrice:[1,0], market:[3,0], speedUp:[-1,0] } },
  { text: "A competitor is trending online. You are losing attention.",
    impact: { innovate:[1,2], lowerPrice:[1,0], market:[4,0], speedUp:[0,1] } },
  { text: "Breakthrough technology emerges in the market.",
    impact: { innovate:[0,6], lowerPrice:[-1,0], market:[1,0], speedUp:[0,2] } }
];

const costs = { innovate: 3, lowerPrice: 1, market: 2, speedUp: 2 };

let stats = { budget: 15, satisfaction: 5, innovativeness: 5 };
let currentRound = 0;
let hasSubmitted = false; // 🔴 NEW LOCK

// ---------------- DISPLAY ----------------
function updateDisplay() {
  document.getElementById("round-title").innerText = "Round " + (currentRound + 1);
  document.getElementById("scenario-text").innerText = scenarios[currentRound].text;

  document.getElementById("stat-budget").innerText = stats.budget;
  document.getElementById("stat-sat").innerText = stats.satisfaction;
  document.getElementById("stat-inn").innerText = stats.innovativeness;
}
updateDisplay();

// ---------------- GAME LOGIC ----------------
function submitActions() {

  if (hasSubmitted) return; // 🔴 BLOCK repeat

  let selected = [...document.querySelectorAll("input:checked")];

  if (selected.length < 1 || selected.length > 2) {
    alert("Choose 1 or 2 actions only.");
    return;
  }

  let totalCost = selected.reduce((sum, i) => sum + costs[i.value], 0);

  if (totalCost > stats.budget) {
    document.getElementById("feedback").innerText =
      `❌ Not enough budget. Need ${totalCost}, have ${stats.budget}.`;
    return;
  }

  let feedback = [];

  selected.forEach(input => {
    let action = input.value;

    stats.budget -= costs[action];

    let effect = scenarios[currentRound].impact[action];
    stats.satisfaction += effect[0];
    stats.innovativeness += effect[1];

    if (action === "innovate") feedback.push("Innovation improved your product and tech edge.");
    if (action === "lowerPrice") feedback.push("Lower pricing boosted customer demand.");
    if (action === "market") feedback.push("Marketing increased visibility and interest.");
    if (action === "speedUp") {
      if (effect[0] < 0) feedback.push("Speeding up increased innovation but reduced satisfaction due to quality trade-offs.");
      else feedback.push("Speeding up improved efficiency and innovation output.");
    }
  });

  stats.budget = Math.max(0, stats.budget);
  stats.satisfaction = Math.max(0, stats.satisfaction);
  stats.innovativeness = Math.max(0, stats.innovativeness);

  document.getElementById("feedback").innerText = feedback.join(" ");

  hasSubmitted = true; // 🔴 LOCK ROUND
  document.getElementById("submitBtn").disabled = true;

  if (stats.budget <= 0) endGame();

  updateDisplay();
}

// ---------------- ROUND FLOW ----------------
function nextRound() {

  currentRound++;

  if (currentRound >= scenarios.length) return endGame();

  hasSubmitted = false; // 🔴 UNLOCK
  document.getElementById("submitBtn").disabled = false;

  document.querySelectorAll("input").forEach(i => i.checked = false);
  document.getElementById("feedback").innerText = "";

  updateDisplay();
}

// ---------------- END GAME ----------------
function endGame() {

  let score =
    (stats.budget * 1) +
    (stats.satisfaction * 2) +
    (stats.innovativeness * 5);

  document.body.innerHTML = `
    <div class="card">
      <h2>🏁 Game Over</h2>
      <p>💰 ${stats.budget} | ❤️ ${stats.satisfaction} | 🚀 ${stats.innovativeness}</p>
      <h3>Final Score: ${score}</h3>
      <button onclick="location.reload()">Restart</button>
    </div>
  `;
}

</script>

</body>
</html>
