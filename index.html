<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Simulation Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #eef2f7, #f9fbfd);
    margin: 0;
    padding: 16px;
    color: #2c3e50;
    text-align: center;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 12px;
  }

  .card {
    background: white;
    padding: 16px;
    margin: 12px auto;
    max-width: 520px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    text-align: left;
  }

  /* SCENARIO */
  .scenario-card {
    background: #2c3e50;
    color: white;
  }

  .round {
    font-size: 13px;
    opacity: 0.8;
  }

  #scenario-text {
    font-size: 16px;
    font-weight: 600;
  }

  /* STATS */
  .stats-card {
    display: flex;
    justify-content: space-around;
    text-align: center;
  }

  .stat {
    background: #f1f5f9;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    min-width: 90px;
  }

  /* ACTION GRID */
  .actions {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }

  .action {
    display: block;
    background: #f4f6f8;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
  }

  .action:hover {
    background: #e8eef7;
  }

  .action input {
    margin-right: 8px;
    transform: scale(1.2);
  }

  /* BUTTONS */
  button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .primary {
    background: #2ecc71;
    color: white;
  }

  .secondary {
    background: #3498db;
    color: white;
  }

  .danger {
    background: #e74c3c;
    color: white;
  }

  .nav {
    display: flex;
    gap: 10px;
  }

  .nav button {
    flex: 1;
  }

  #feedback {
    background: #f9fafc;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>

<body>

<h1>📱 Market Simulation</h1>

<!-- SCENARIO -->
<div class="card scenario-card">
  <div id="round-title" class="round"></div>
  <p id="scenario-text"></p>
</div>

<!-- STATS -->
<div class="card stats-card">
  <div class="stat">💰 <span id="stat-budget"></span></div>
  <div class="stat">❤️ <span id="stat-sat"></span></div>
  <div class="stat">🚀 <span id="stat-inn"></span></div>
</div>

<!-- ACTIONS -->
<div class="card">
  <h3>Choose Actions (1–2 max)</h3>

  <div class="actions">
    <label class="action">
      <input type="checkbox" value="innovate"> ⚙️ Innovate
    </label>

    <label class="action">
      <input type="checkbox" value="lowerPrice"> 💰 Lower Price
    </label>

    <label class="action">
      <input type="checkbox" value="market"> 📢 Market
    </label>

    <label class="action">
      <input type="checkbox" value="speedUp"> ⚡ Speed Up
    </label>
  </div>

  <button class="primary" onclick="submitActions()">Submit Actions</button>
</div>

<!-- FEEDBACK -->
<div class="card">
  <p id="feedback"></p>
</div>

<!-- NAV -->
<div class="card nav">
  <button class="secondary" onclick="nextRound()">Next Round</button>
  <button class="danger" onclick="endGame()">End Game</button>
</div>

<script>

// ---------------- DATA ----------------
const scenarios = [
  {
    text: "Competitors release better features. You're losing market share!",
    impact: { innovate:[0,3], lowerPrice:[2,0], market:[1,0], speedUp:[0,1] }
  },
  {
    text: "Competitors lower their prices. Customers are switching.",
    impact: { innovate:[0,2], lowerPrice:[3,0], market:[1,0], speedUp:[1,0] }
  },
  {
    text: "Customers complain about your product features.",
    impact: { innovate:[0,4], lowerPrice:[1,0], market:[3,0], speedUp:[-1,0] }
  },
  {
    text: "A competitor is trending online. You are losing attention.",
    impact: { innovate:[1,2], lowerPrice:[1,0], market:[4,0], speedUp:[0,1] }
  },
  {
    text: "Breakthrough technology emerges in the market.",
    impact: { innovate:[0,6], lowerPrice:[-1,0], market:[1,0], speedUp:[0,2] }
  }
];

const costs = {
  innovate: 3,
  lowerPrice: 1,
  market: 2,
  speedUp: 2
};

let stats = {
  budget: 15,
  satisfaction: 5,
  innovativeness: 5
};

let currentRound = 0;

// ---------------- DISPLAY ----------------
function updateDisplay() {
  document.getElementById("round-title").innerText = "Round " + (currentRound + 1);
  document.getElementById("scenario-text").innerText = scenarios[currentRound].text;

  document.getElementById("stat-budget").innerText = stats.budget;
  document.getElementById("stat-sat").innerText = stats.satisfaction;
  document.getElementById("stat-inn").innerText = stats.innovativeness;
}

updateDisplay();

// ---------------- GAME LOGIC ----------------
function submitActions() {

  let selected = [...document.querySelectorAll("input:checked")];

  if (selected.length < 1 || selected.length > 2) {
    alert("Choose 1 or 2 actions only.");
    return;
  }

  let feedback = [];

  selected.forEach(input => {
    let action = input.value;

    if (stats.budget < costs[action]) return;

    stats.budget -= costs[action];

    let effect = scenarios[currentRound].impact[action];

    stats.satisfaction += effect[0];
    stats.innovativeness += effect[1];

    if (action === "innovate") feedback.push("Innovation improved product quality.");
    if (action === "lowerPrice") feedback.push("Lower prices increased demand.");
    if (action === "market") feedback.push("Marketing improved visibility.");
    if (action === "speedUp") feedback.push("Speed improved efficiency.");
  });

  stats.budget = Math.max(0, stats.budget);
  stats.satisfaction = Math.max(0, stats.satisfaction);
  stats.innovativeness = Math.max(0, stats.innovativeness);

  document.getElementById("feedback").innerText = feedback.join(" ");

  if (stats.budget <= 0) {
    endGame();
    return;
  }

  updateDisplay();
}

// ---------------- ROUND FLOW ----------------
function nextRound() {

  currentRound++;

  if (currentRound >= scenarios.length) {
    endGame();
    return;
  }

  document.querySelectorAll("input").forEach(i => i.checked = false);
  document.getElementById("feedback").innerText = "";

  updateDisplay();
}

// ---------------- END GAME ----------------
function endGame() {

  let score =
    (stats.budget * 1) +
    (stats.satisfaction * 2) +
    (stats.innovativeness * 5);

  let strengths = [];
  let weaknesses = [];

  if (stats.innovativeness >= 8) strengths.push("strong innovation strategy");
  else weaknesses.push("limited investment in innovation");

  if (stats.satisfaction >= 7) strengths.push("good customer satisfaction management");
  else weaknesses.push("weak customer satisfaction performance");

  if (stats.budget > 10) strengths.push("efficient budget management");
  else weaknesses.push("high spending reduced financial stability");

  document.body.innerHTML = `
    <div class="card">
      <h2>🏁 Game Over</h2>

      <p>💰 Budget: ${stats.budget}</p>
      <p>❤️ Satisfaction: ${stats.satisfaction}</p>
      <p>🚀 Innovativeness: ${stats.innovativeness}</p>

      <h3>Final Score: ${score}</h3>

      <hr>

      <h3>📊 Evaluation</h3>
      <p><b>Strengths:</b> ${strengths.join(", ") || "None clearly demonstrated"}</p>
      <p><b>Areas for improvement:</b> ${weaknesses.join(", ") || "Well balanced performance"}</p>

      <button onclick="location.reload()">Restart</button>
    </div>
  `;
}

</script>

</body>
</html>
